<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vivre Ensemble — Accès réservé</title>
<style>
@font-face{font-family:'Playfair Display';font-style:normal;font-weight:700;font-display:swap;src:url('fonts/playfair-display-700-normal.woff2') format('woff2')}
@font-face{font-family:'Playfair Display';font-style:normal;font-weight:800;font-display:swap;src:url('fonts/playfair-display-800-normal.woff2') format('woff2')}
@font-face{font-family:'Source Sans 3';font-style:normal;font-weight:300;font-display:swap;src:url('fonts/source-sans-3-300-normal.woff2') format('woff2')}
@font-face{font-family:'Source Sans 3';font-style:normal;font-weight:400;font-display:swap;src:url('fonts/source-sans-3-400-normal.woff2') format('woff2')}
@font-face{font-family:'Source Sans 3';font-style:normal;font-weight:600;font-display:swap;src:url('fonts/source-sans-3-600-normal.woff2') format('woff2')}
@font-face{font-family:'Caveat';font-style:normal;font-weight:500;font-display:swap;src:url('fonts/caveat-500-normal.woff2') format('woff2')}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Source Sans 3',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#152d44 0%,#1e4068 40%,#1a3a5c 100%)}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(61,143,212,.12) 0%,transparent 60%),radial-gradient(ellipse at 70% 80%,rgba(45,106,79,.08) 0%,transparent 50%);pointer-events:none}
.lock-box{position:relative;z-index:1;background:rgba(255,255,255,.04);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:56px 48px;max-width:440px;width:90%;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.3)}
.lock-icon{font-size:48px;margin-bottom:24px;opacity:.8}
.lock-title{font-family:'Playfair Display',serif;font-weight:800;font-size:28px;color:#fff;margin-bottom:8px}
.lock-subtitle{font-family:'Caveat',cursive;font-size:20px;color:#f0d77b;margin-bottom:32px}
.lock-desc{font-size:14px;color:rgba(255,255,255,.5);margin-bottom:28px;line-height:1.6}
.lock-input{width:100%;padding:14px 20px;border:1px solid rgba(255,255,255,.15);border-radius:12px;background:rgba(255,255,255,.06);color:#fff;font-size:16px;font-family:'Source Sans 3',sans-serif;outline:none;transition:border-color .3s}
.lock-input:focus{border-color:rgba(240,215,123,.5)}
.lock-input::placeholder{color:rgba(255,255,255,.3)}
.lock-btn{width:100%;margin-top:16px;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,#2e6ea6,#3d8fd4);color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:transform .2s,box-shadow .2s}
.lock-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(61,143,212,.3)}
.lock-error{color:#e07a5f;font-size:13px;margin-top:12px;min-height:20px}
.lock-footer{font-size:11px;color:rgba(255,255,255,.2);margin-top:32px}
</style>
</head>
<body>
<div class="lock-box">
  <div class="lock-icon">🔒</div>
  <div class="lock-title">Vivre Ensemble</div>
  <div class="lock-subtitle">Portieux – La Verrerie</div>
  <div class="lock-desc">Ce site est en cours de finalisation.<br>Accès réservé aux membres de l'équipe.</div>
  <input type="password" class="lock-input" id="pwd" placeholder="Mot de passe" autofocus>
  <button class="lock-btn" id="btn" onclick="unlock()">Accéder au site</button>
  <div class="lock-error" id="err"></div>
  <div class="lock-footer">Élections municipales 2026</div>
</div>

function unlock(){
  var p=document.getElementById("pwd").value;
  if(!p){document.getElementById("err").textContent="Veuillez entrer le mot de passe";return}
  try{
    var d=CryptoJS.AES.decrypt(E,p).toString(CryptoJS.enc.Utf8);
    if(!d||d.length<50){document.getElementById("err").textContent="Mot de passe incorrect";return}
    document.open();document.write(d);document.close();
  }catch(e){document.getElementById("err").textContent="Mot de passe incorrect"}
}
